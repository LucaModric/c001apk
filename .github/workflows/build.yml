name: Build

on:
  workflow_dispatch:
  # 允许推送标签时触发（只有当标签名以 v 开头时才触发，例如 v1.0.0）
  push:
    tags:
      - 'v*'
  # 插件会自动在后台隐式读取系统自带的 secrets.GITHUB_TOKEN，发布release不再需要你显式地写出 env: GITHUB_TOKEN 这行代码
permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          cache: true
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --split-per-abi
        # Error: ⚠️ GitHub Releases requires a tag 需要tag才能触发
      - name:  Create Release and Upload APK
        uses:  softprops/action-gh-release@v2
        with:
          name: COOL_Android
            # 👇 核心优化：智能判断标签名，兼容手动触发和新建tag触发
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v1.0.{0}', github.run_number) }} 
          # tag_name 必须配置,github.run_number是系统自增值，手动触发时tag为系统自动生成
          body: |
            和上游只有微小区别
            > app名字改为COOL；
            > tab项移除APP。      
          files: build/app/outputs/flutter-apk/*.apk

  # 使用 GitHub 官方自带的 gh 命令行工具，无需任何第三方 action,更简单的写法，动态参数可以自定义，比如tag等
  #    - name: Create Release and Upload APK
  #      run: |
  #        gh release create "v1.0.0-${{ github.run_number }}" \
  #           --title "Release v1.0.0 (Build ${{ github.run_number }})" \
  #          --notes "自动构建的 APK 产物" \
  #          build/app/outputs/flutter-apk/*.apk